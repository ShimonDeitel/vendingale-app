name: Vendingale
options:
  bundleIdPrefix: com.shimondeitel.snackfund
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vendingale:
    type: application
    platform: iOS
    sources:
      - path: Vendingale
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snackfund
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vendingale/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VendingaleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VendingaleTests
      - path: Vendingale.storekit
    dependencies:
      - target: Vendingale
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snackfund.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VendingaleUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VendingaleUITests
    dependencies:
      - target: Vendingale
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snackfund.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vendingale:
    build:
      targets:
        Vendingale: all
        VendingaleTests: [test]
        VendingaleUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vendingale.storekit
    test:
      config: Debug
      storeKitConfiguration: Vendingale.storekit
      targets:
        - VendingaleTests
        - VendingaleUITests
    archive:
      config: Release
